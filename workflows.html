const KEY = 'aer_preview_pw';   // tab-scoped: unlock once, browse all pages
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decrypt(pw){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw),
    'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(P.salt), iterations:P.iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.iv)}, key, b64(P.ct));
  return new TextDecoder().decode(buf);
}
async function tryUnlock(pw, silent){
  try {
    const html = await decrypt(pw);
    sessionStorage.setItem(KEY, pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    sessionStorage.removeItem(KEY);
    if (!silent) {
      document.getElementById('err').textContent = 'Incorrect password.';
      document.getElementById('pw').select();
    }
  }
}
document.getElementById('go').addEventListener('click', () => tryUnlock(document.getElementById('pw').value, false));
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(document.getElementById('pw').value, false); });
const saved = sessionStorage.getItem(KEY);
if (saved) tryUnlock(saved, true);   // auto-unlock within the same tab
